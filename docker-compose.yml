version: '3.8'
services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/ml/saved_models/best_model.joblib
    volumes:
      - ./ml/saved_models:/app/ml/saved_models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    restart: unless-stopped